<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kinoview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preload" href="kinoview-logo.png" as="image">
    <link href="style.css" rel="stylesheet" />
    <script src="index.js" defer></script>
  </head>

  <body>
    <div id="intro-overlay" class="intro-overlay">
      <div class="intro-logo-wrapper">
        <img src="kinoview-logo.png" alt="Kinoview" class="intro-logo" draggable="false" />
      </div>
    </div>
    <div class="app-container">
      <header class="header">
        <nav class="nav-bar">
          <div class="logo">
            <svg class="logo-icon" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
              <line x1="8" y1="21" x2="16" y2="21"></line>
              <line x1="12" y1="17" x2="12" y2="21"></line>
              <polyline points="8 7 8 13 11 10 8 7"></polyline>
            </svg>
            <h1 class="logo-text">Kino<span class="logo-accent">view</span></h1>
          </div>
        </nav>
        <p class="tagline">Your media, beautifully organized</p>
      </header>
      
      <div class="layout">
        <!-- Sidebar: Shows / Seasons / Episodes -->
        <aside class="sidebar" id="showsSidebar">
          <div class="sidebar-header">
            <h2 class="sidebar-title">Episodes</h2>
          </div>
          <div class="sidebar-body" id="sidebarBody">
            <div class="sidebar-loading">Loading…</div>
          </div>
        </aside>

        <!-- Main: Player + Controls -->
        <main class="player-panel">
          <div class="hero-section" id="heroSection">
            <div class="hero-icon">
              <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
              </svg>
            </div>
            <p class="hero-text">Select a video or search to start watching</p>
          </div>

          <div class="video-wrapper">
            <video id="screen" class="screen" controls type="video/mp4">
              <track default id="subs" kind="subtitles" />
              Your browser does not support the video tag.
            </video>
            
            <div class="video-overlay">
              <div class="overlay-controls">
                  <div class="dropdown-group">
                      <button class="overlay-btn" id="audioBtn" title="Audio Tracks" onclick="toggleMenu('audioMenu')">
                          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>
                      </button>
                      <div id="audioMenu" class="dropdown-menu hidden"></div>
                  </div>
                  <div class="dropdown-group">
                      <button class="overlay-btn" id="subsBtn" title="Subtitles" onclick="toggleMenu('subsMenu')">
                          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                      </button>
                      <div id="subsMenu" class="dropdown-menu hidden"></div>
                  </div>
              </div>
            </div>
          </div>

          <div id="butler-suggestions" class="suggestions-container" style="display: none;">
            <h3>Butler Suggestions</h3>
            <div id="suggestions-list" class="suggestions-list"></div>
          </div>
          
          <div id="selection-wrapper" class="control-panel">
            <div class="control-group">
              <label for="searchInput">Search videos</label>
              <div class="search-wrapper">
                <input
                  id="searchInput"
                  class="mediaSelector input-field"
                  type="text"
                  placeholder="Search by name, path, or metadata..."
                  onkeyup="searchMedia()"
                  onfocus="searchMedia()"
                  autocomplete="off"
                />
                <div id="searchResults" class="search-results hidden"></div>
              </div>
            </div>

            <div class="control-group">
              <label for="recommendInput">Ask for a recommendation</label>
              <div class="input-with-button">
                <input
                  id="recommendInput"
                  class="mediaSelector input-field"
                  type="text"
                  placeholder="Type what you feel like watching..."
                  onkeydown="if(event.key==='Enter'){requestRecommendation()}"
                />
                <button class="btn-primary" onclick="requestRecommendation()">Recommend</button>
              </div>
              <p id="recommendationStatus" class="status-text"></p>
            </div>

            <div class="control-group">
              <label for="debugMediaSelector">Select a video</label>
              <div class="select-wrapper">
                <select
                  id="debugMediaSelector"
                  class="mediaSelector select-field"
                  onchange="selectMedia(this.value)"
                >
                  <option value="">Select video</option>
                </select>
              </div>
            </div>

            <div class="control-group">
              <label for="debugSubsSelector">Select subtitles</label>
              <div class="select-wrapper">
                <select
                  id="debugSubsSelector"
                  class="mediaSelector select-field"
                  onchange="selectSubtitle(this.value)"
                >
                  <option value="">Select subtitles</option>
                </select>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
