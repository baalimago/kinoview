<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shows — Kinoview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet" />
  <link href="shows.css" rel="stylesheet" />
  <script src="shows.js" defer></script>
</head>
<body>
  <div class="app-container">
    <header class="header">
      <nav class="nav-bar">
        <a href="/" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          Back to Player
        </a>
        <h1>Shows</h1>
        <div class="nav-spacer"></div>
      </nav>
    </header>

    <main class="main-content">
      <div id="shows-grid" class="shows-grid">
        <div class="loading-state">Loading shows…</div>
      </div>
    </main>
  </div>

  <template id="show-card-template">
    <div class="show-card">
      <div class="show-card-poster">
        <div class="poster-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
        </div>
      </div>
      <div class="show-card-body">
        <h3 class="show-card-title"></h3>
        <p class="show-card-meta"></p>
      </div>
    </div>
  </template>

  <template id="season-view-template">
    <div class="season-view">
      <button class="back-to-shows-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        All Shows
      </button>
      <div class="show-header">
        <h2 class="show-title"></h2>
        <div class="show-stats"></div>
      </div>
      <div class="season-tabs"></div>
      <div class="episode-list"></div>
    </div>
  </template>

  <template id="episode-row-template">
    <div class="episode-row">
      <div class="episode-number"></div>
      <div class="episode-info">
        <span class="episode-name"></span>
        <span class="episode-duration"></span>
      </div>
      <button class="episode-play-btn" title="Play">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
      </button>
    </div>
  </template>
</body>
</html>
